<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
<title>GutAuto Test 2</title>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<script src="scripts/gutAuto.js" type="text/javascript"></script>
	<link rel="stylesheet" type="text/css" href="scripts/gutAuto.css">	
</head>

<body>
<div >
<p>
For <em>Drosophila</em> try the options indicated. For the other insects, only GeneIDd is available.<br>
For <em>B. mori</em> try BGIBMGA01017<br>
For <em>A. aegypti</em> try AAEL01065<br>
</p>

<p>
<select name="organism" id="organism">
<option selected="selected" value="dm">D. melanogaster</option>
<option value="bm">B. mori</option>
<option value="aa">A. aegypti</option>
</select>
</p>

<p>
<input type="radio" name="idtype" id="symbol" checked="checked"> Gene Symbol (e.g. vkg)<br>
<input type="radio" name="idtype" id="name"> Gene Name (e.g. viking)<br>
<input type="radio" name="idtype" id="cgnum"> CG id (e.g. CG16858)<br>
<input type="radio" name="idtype" id="geneid"> FBgn/GeneID (e.g. FBgn0016075)
</p>

<p>
Gene: <input type="text" autocomplete="off" size="40" id="gene" style="height:15px;" onkeyup="findNames();">
</p>

<!-- start of autocomplete div -->
<div style="position:absolute;" id="popup">
<table id="menuTable" cellspacing="0" cellpadding="0">            
<tbody id="menuTableBody"><tr><td></td></tr></tbody>
</table>
</div><!-- end of autocomplete div -->

</div>

</body>
</html>
