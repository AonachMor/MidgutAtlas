<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
<title>GutAuto Test</title>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<script src="scripts/gutAuto.js" type="text/javascript"></script>
	<link rel="stylesheet" type="text/css" href="scripts/gutAuto2.css">	
</head>

<body onkeypress="geneKey(event)">
<div id="wrapper">

<p>
<select name="organism" id="organism" onchange="radioCheck();">
<option selected="selected" value="dm">D. melanogaster</option>
<option value="bm">B. mori</option>
<option value="aa">A. aegypti</option></select>
</p>
<input type="radio" name="idtype" id="symbol"> Gene Symbol (e.g. vk(g) )<br>
<input type="radio" name="idtype" id="name"> Gene Name (e.g. vi(king) )<br>
<input type="radio" name="idtype" id="cgnum"> Annotation symbol (e.g. CG168(58) )<br>
<input type="radio" name="idtype" id="geneid" checked="checked"> Gene ID (e.g. FBgn001607(5), BGIBMGA01017(4), AAEL01065(5) )<br>
<p>
<span class="lableftFirst">Gene: </span><input type="text" autocomplete="off" size="40" id="gene" value="" style="height:15px;" onkeyup="findNames();"><button onclick="sendSearchGeneForm();">Search</button>
</p>
<div style="position:absolute;" id="popup">
<table id="menuTable" cellspacing="0" cellpadding="0">
<tbody id="menuTableBody"><tr><td></td></tr></tbody>
</table>
</div><!-- end of autocomplete div -->


</div> <!-- end of wrapper div -->
</body>
</html>
